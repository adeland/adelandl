<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#f7f2ec" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1e1719" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Portfolio — systems engineering, quantitative execution, and clean, high-performance design." />
  <meta property="og:title" content="Portfolio" />
  <meta property="og:description" content="Portfolio — systems engineering, quantitative execution, and clean, high-performance design." />
  <meta property="og:type" content="website" />
  <!-- Path-relative og:image works on most scrapers; once the site has its
       final domain, swap in the absolute URL (see README). -->
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="A dark card table: a gilded playing card bearing a crowned pomegranate, beneath a gold crescent moon." />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="manifest" href="/manifest.json" />
  <title>Portfolio</title>
  <script>
    // Set the theme class before first paint so dark-mode visitors never
    // see an ivory flash. Mirrors the logic in ThemeContext.
    try {
      var saved = localStorage.getItem('theme');
      var dark = saved
        ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.add(dark ? 'dark' : 'light');
    } catch (e) {}
  </script>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
